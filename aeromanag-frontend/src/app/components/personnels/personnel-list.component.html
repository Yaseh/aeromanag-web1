<h2>Personnels</h2>
<a routerLink="/personnels/nouveau">+ Nouveau personnel</a>
<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Nom</th>
      <th>Prenom</th>
      <th>Role</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    @for (p of service.personnels(); track p.idPersonnel) {
      <tr>
        <td>{{ p.idPersonnel }}</td>
        <td>{{ p.nom }}</td>
        <td>{{ p.prenom }}</td>
        <td>{{ p.role }}</td>
        <td>
          <a [routerLink]="['/personnels', p.idPersonnel, 'modifier']">Modifier</a>
          <button (click)="supprimer(p.idPersonnel)">Supprimer</button>
        </td>
      </tr>
    } @empty {
      <tr><td colspan="5">Aucun personnel.</td></tr>
    }
  </tbody>
</table>
